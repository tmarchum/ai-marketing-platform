services:
  - type: web
    name: dashboard-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npx tsx src/index.ts
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: "3001"
      - key: FRONTEND_URL
        sync: false
