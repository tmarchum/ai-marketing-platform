name: Auto-Reply to Comments

on:
  schedule:
    # Runs every 10 minutes (offset by 5 min from publish cron to spread load)
    - cron: '5,15,25,35,45,55 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger replies cron
        run: |
          response=$(curl -s -w "\n%{http_code}" --max-time 120 "https://dashboard-steel-delta-52.vercel.app/api/cron/replies")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "Response: $body"
          if [ "$code" != "200" ]; then
            echo "::error::Cron endpoint returned $code"
            exit 1
          fi
