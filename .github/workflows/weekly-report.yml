name: Weekly Report Email

on:
  schedule:
    # Every Sunday at 08:00 Israel time (05:00 UTC in winter, 06:00 in summer — using 06:00 as compromise)
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly report
        run: |
          response=$(curl -s -w "\n%{http_code}" --max-time 120 "https://dashboard-steel-delta-52.vercel.app/api/cron/weekly-report")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "Response: $body"
          if [ "$code" != "200" ]; then
            echo "::error::Weekly report failed with $code"
            exit 1
          fi
